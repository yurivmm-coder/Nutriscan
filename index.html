<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NutriScan Pro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f; --surface: #111118; --surface2: #1a1a24; --border: #2a2a3a;
    --accent: #c8f55a; --accent2: #7c6af5; --text: #f0f0f5; --muted: #8b8b99;
    --protein: #c8f55a; --carbs: #f5a55a; --fat: #f55a8a; --cal: #5ac8f5;
    --gold: #FFD700; --red: #FF4136;
  }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 0 0 80px; }
  header { width: 100%; padding: 28px 24px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); background: var(--bg); position: sticky; top: 0; z-index: 10; }
  .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.5rem; letter-spacing: -0.03em; }
  .logo span { color: var(--accent); }
  .header-right { display: flex; gap: 10px; align-items: center; }
  .daily-badge, .profile-btn { font-size: 0.7rem; font-weight: 600; color: var(--muted); background: var(--surface2); border: 1px solid var(--border); padding: 6px 12px; border-radius: 20px; letter-spacing: 0.05em; text-transform: uppercase; cursor: pointer; }
  .container { width: 100%; max-width: 480px; padding: 0 16px; display: flex; flex-direction: column; gap: 16px; margin-top: 16px; }
  .ai-tip { background: rgba(124, 106, 245, 0.1); border: 1px solid var(--accent2); border-radius: 16px; padding: 16px; display: flex; gap: 12px; align-items: center; font-size: 0.85rem; display: none; line-height: 1.5; }
  .daily-totals { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 20px; }
  .totals-label { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 16px; font-family: 'Syne', sans-serif; display: flex; justify-content: space-between; }
  .totals-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .total-item { text-align: center; }
  .total-value { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.4rem; line-height: 1; }
  .total-label { font-size: 0.65rem; color: var(--muted); margin-top: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
  .progress-container { width: 100%; height: 4px; background: var(--surface2); border-radius: 2px; margin-top: 10px; overflow: hidden; }
  .progress-bar { height: 100%; width: 0%; transition: width 0.4s ease; }
  .total-item.cal .total-value { color: var(--cal); } .total-item.cal .progress-bar { background: var(--cal); }
  .total-item.protein .total-value { color: var(--protein); } .total-item.protein .progress-bar { background: var(--protein); }
  .total-item.carbs .total-value { color: var(--carbs); } .total-item.carbs .progress-bar { background: var(--carbs); }
  .total-item.fat .total-value { color: var(--fat); } .total-item.fat .progress-bar { background: var(--fat); }
  .progress-bar.gold { background: var(--gold) !important; } .total-value.gold { color: var(--gold) !important; }
  .progress-bar.red { background: var(--red) !important; } .total-value.red { color: var(--red) !important; }
  .health-dash { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 20px; display: none; flex-direction: column; gap: 20px; }
  .water-row { display: flex; justify-content: space-between; padding: 0 4px; }
  .drop { font-size: 1.6rem; cursor: pointer; opacity: 0.25; transition: all 0.2s; }
  .drop.active { opacity: 1; transform: scale(1.1); }
  .journey-wrapper { background: var(--surface2); padding: 16px; border-radius: 12px; display: flex; flex-direction: column; gap: 12px; }
  .journey-track { height: 6px; background: rgba(0,0,0,0.5); border-radius: 3px; position: relative; }
  .journey-dot { position: absolute; top: 50%; width: 16px; height: 16px; background: var(--gold); border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 12px var(--gold); left: 0%; transition: left 0.5s; }
  .quick-add-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .quick-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 12px; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
  .quick-label { font-size: 0.6rem; text-transform: uppercase; margin-top: 5px; color: var(--muted); font-weight: 700; }
  .scan-btn { width: 100%; background: var(--accent); color: #0a0a0f; border: none; border-radius: 16px; padding: 20px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
  #scanner-container { display: none; margin-top: 16px; border-radius: 16px; overflow: hidden; position: relative; aspect-ratio: 4/3; background: #000; }
  .input-row { display: flex; gap: 10px; }
  .flex-input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px; color: var(--text); outline: none; }
  .flex-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 14px; padding: 0 20px; font-family: 'Syne', sans-serif; font-weight: 600; cursor: pointer; }
  .divider { text-align: center; color: var(--muted); font-size: 0.7rem; text-transform: uppercase; margin: 10px 0; letter-spacing: 1px; }
  .recent-chips { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
  .recent-chip { background: var(--surface); border: 1px solid var(--border); padding: 8px 15px; border-radius: 20px; font-size: 0.8rem; white-space: nowrap; cursor: pointer; }
  .result-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; display: none; margin-top: 10px; }
  .macros-grid { display: grid; grid-template-columns: repeat(4, 1fr); border-top: 1px solid var(--border); }
  .macro-item { padding: 15px 5px; text-align: center; border-right: 1px solid var(--border); }
  .macro-value { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.2rem; }
  .log-item { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 16px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .reset-btn { width: 100%; background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 12px; border-radius: 12px; margin-top: 10px; cursor: pointer; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 100; }
  .modal-overlay.active { display: flex; }
  .modal-content { background: var(--surface); padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; }
  .save-btn { width: 100%; background: var(--accent); color: #000; border: none; padding: 15px; border-radius: 12px; font-weight: 700; cursor: pointer; }
</style>
</head>
<body>
<header><div class="logo">Nutri<span>Scan</span></div><div class="header-right"><button class="profile-btn" onclick="toggleProfile()">⚙️ Profile</button><div class="daily-badge" id="date-badge">Today</div></div></header>
<div class="container">
  <div class="ai-tip" id="ai-tip"><span>💡</span><div id="ai-tip-text">Set profile to start.</div></div>
  <div class="daily-totals">
    <div class="totals-label"><span>Daily totals</span> <span id="cal-target-text"></span></div>
    <div class="totals-grid">
      <div class="total-item cal"><div class="total-value" id="total-cal">0</div><div class="total-label">kcal</div><div class="progress-container"><div class="progress-bar" id="pb-cal"></div></div></div>
      <div class="total-item protein"><div class="total-value" id="total-protein">0g</div><div class="total-label">Pro</div><div class="progress-container"><div class="progress-bar" id="pb-pro"></div></div></div>
      <div class="total-item carbs"><div class="total-value" id="total-carbs">0g</div><div class="total-label">Carb</div><div class="progress-container"><div class="progress-bar" id="pb-carb"></div></div></div>
      <div class="total-item fat"><div class="total-value" id="total-fat">0g</div><div class="total-label">Fat</div><div class="progress-container"><div class="progress-bar" id="pb-fat"></div></div></div>
    </div>
  </div>
  <div class="health-dash" id="health-dash">
    <div class="water-row" id="water-drops"></div>
    <div class="journey-wrapper">
      <div class="journey-track"><div class="journey-dot" id="journey-dot"></div></div>
      <div style="text-align:center;font-size:0.7rem;color:var(--muted);margin-top:5px;">Consistency Journey: <span id="streak-txt">0</span> Days</div>
    </div>
    <button class="reset-btn" onclick="resetDay()">End & Reset Day</button>
  </div>
  <div class="quick-add-grid">
    <div class="quick-btn" onclick="logAIItem('coffee')">☕<span class="quick-label">Coffee</span></div>
    <div class="quick-btn" onclick="logAIItem('banana')">🍌<span class="quick-label">Fruit</span></div>
    <div class="quick-btn" onclick="logAIItem('protein shake')">🥤<span class="quick-label">Shake</span></div>
    <div class="quick-btn" onclick="toggleWater(waterCount+1)">💧<span class="quick-label">Water</span></div>
  </div>
  <button class="scan-btn" onclick="startScanner()">Scan Barcode</button>
  <div id="scanner-container"><div id="interactive"></div></div>
  <div class="divider">Describe your food</div>
  <div class="input-row"><input type="text" class="flex-input" id="ai-input" placeholder="e.g. 2 eggs and honey"><button class="flex-btn" onclick="parseAIFood()">Look up</button></div>
  <div class="divider">Recent Scans</div>
  <div class="recent-chips" id="recent-chips"></div>
  <div class="result-card" id="result-card">
    <div style="padding:20px;"><div id="result-name" style="font-weight:700;"></div><div id="result-serving" style="color:var(--muted);font-size:0.8rem;"></div></div>
    <div class="macros-grid">
      <div class="macro-item"><div class="macro-value" id="r-cal"></div><div style="font-size:0.6rem;">kcal</div></div>
      <div class="macro-item"><div class="macro-value" id="r-protein"></div><div style="font-size:0.6rem;">P</div></div>
      <div class="macro-item"><div class="macro-value" id="r-carbs"></div><div style="font-size:0.6rem;">C</div></div>
      <div class="macro-item"><div class="macro-value" id="r-fat"></div><div style="font-size:0.6rem;">F</div></div>
    </div>
    <button class="scan-btn" onclick="addToLog()" style="margin:10px;width:calc(100% - 20px);">Add to Log</button>
  </div>
  <div class="log-section"><div class="divider">Food Log</div><div id="log-list"></div></div>
</div>
<div class="modal-overlay" id="profile-modal"><div class="modal-content"><h2 style="margin-bottom:20px;">Settings</h2><button class="save-btn" onclick="saveProfile()">Initialize App</button></div></div>

<script>
  let log = JSON.parse(localStorage.getItem('n-log') || '[]');
  let goals = JSON.parse(localStorage.getItem('n-goals') || 'null');
  let waterCount = parseInt(localStorage.getItem('n-water') || '0');
  let streak = parseInt(localStorage.getItem('n-streak') || '0');
  let cache = JSON.parse(localStorage.getItem('n-cache') || '{}');
  let currentProduct = null;

  const foodDB = {
    "egg": { cal: 72, p: 6, c: 0.5, f: 5 }, "eggs": { cal: 72, p: 6, c: 0.5, f: 5 },
    "honey": { cal: 22, p: 0, c: 6, f: 0 }, "banana": { cal: 105, p: 1, c: 27, f: 0 },
    "coffee": { cal: 2, p: 0, c: 0, f: 0 }, "protein shake": { cal: 120, p: 24, c: 3, f: 1.5 },
    "greggs pizza": { cal: 550, p: 22, c: 60, f: 24 }, "sausage roll": { cal: 320, p: 9, c: 24, f: 22 },
    "steak bake": { cal: 400, p: 12, c: 30, f: 26 }
  };

  function parseAIFood() {
    const input = document.getElementById('ai-input').value.toLowerCase();
    const parts = input.split(/ and | \+ | with |,/);
    let total = { cal: 0, p: 0, c: 0, f: 0, names: [] };

    parts.forEach(part => {
      let qty = 1;
      let words = part.trim().split(' ');
      if (words[0].match(/\d+/)) qty = parseFloat(words[0]);
      if (part.includes("little") || part.includes("bit")) qty = 0.5;

      let foodKey = Object.keys(foodDB).find(k => part.includes(k));
      if (foodKey) {
        total.cal += foodDB[foodKey].cal * qty;
        total.p += foodDB[foodKey].p * qty;
        total.c += foodDB[foodKey].c * qty;
        total.f += foodDB[foodKey].f * qty;
        total.names.push(qty === 0.5 ? `A little ${foodKey}` : (qty > 1 ? `${qty}x ${foodKey}` : foodKey));
      }
    });

    if (total.names.length > 0) {
      currentProduct = { name: total.names.join(' + '), cal: Math.round(total.cal), protein: total.p, carbs: total.c, fat: total.f };
      displayResult();
    }
  }

  function displayResult() {
    document.getElementById('result-name').textContent = currentProduct.name;
    document.getElementById('r-cal').textContent = currentProduct.cal;
    document.getElementById('r-protein').textContent = currentProduct.protein.toFixed(1);
    document.getElementById('r-carbs').textContent = currentProduct.carbs.toFixed(1);
    document.getElementById('r-fat').textContent = currentProduct.fat.toFixed(1);
    document.getElementById('result-card').style.display = 'block';
  }

  function addToLog() {
    log.push({...currentProduct, id: Date.now()});
    localStorage.setItem('n-log', JSON.stringify(log));
    document.getElementById('result-card').style.display = 'none';
    render();
  }

  function render() {
    document.getElementById('log-list').innerHTML = log.length ? log.map(i => `<div class="log-item"><span>${i.name}</span><strong>${i.cal} kcal</strong></div>`).join('') : '<div style="text-align:center;color:var(--muted);padding:20px;">Log is empty</div>';
    updateStats();
  }

  function updateStats() {
    const t = log.reduce((acc, i) => ({ cal: acc.cal + i.cal, p: acc.p + i.protein, c: acc.c + i.carbs, f: acc.f + i.fat }), { cal: 0, p: 0, c: 0, f: 0 });
    document.getElementById('total-cal').textContent = Math.round(t.cal);
    document.getElementById('total-protein').textContent = Math.round(t.p) + 'g';
    document.getElementById('total-carbs').textContent = Math.round(t.c) + 'g';
    document.getElementById('total-fat').textContent = Math.round(t.f) + 'g';
    if (goals) {
      document.getElementById('cal-target-text').textContent = `Goal: ${goals.cal}`;
      let p = (t.cal / goals.cal) * 100;
      document.getElementById('pb-cal').style.width = Math.min(p, 100) + '%';
      document.getElementById('pb-cal').className = 'progress-bar' + (p >= 90 && p <= 105 ? ' gold' : p > 105 ? ' red' : '');
      document.getElementById('ai-tip').style.display = 'flex';
      document.getElementById('health-dash').style.display = 'flex';
      document.getElementById('journey-dot').style.left = Math.min(streak * 5, 95) + '%';
      document.getElementById('streak-txt').textContent = streak;
    }
  }

  function toggleWater(v) { waterCount = v > 8 ? 0 : v; localStorage.setItem('n-water', waterCount); renderWater(); updateStats(); }
  function renderWater() {
    let h = ''; for(let i=1; i<=8; i++) h += `<span class="drop ${i<=waterCount?'active':''}" onclick="toggleWater(${i})">💧</span>`;
    document.getElementById('water-drops').innerHTML = h;
  }
  function resetDay() {
    if (goals && log.reduce((a,b)=>a+b.cal,0)/goals.cal >= 0.9) streak++;
    log = []; waterCount = 0; localStorage.setItem('n-log', '[]'); localStorage.setItem('n-water', 0); localStorage.setItem('n-streak', streak); render(); renderWater();
  }
  function logAIItem(item) { document.getElementById('ai-input').value = item; parseAIFood(); }
  function toggleProfile() { document.getElementById('profile-modal').classList.toggle('active'); }
  function saveProfile() { goals = { cal: 2200, p: 150, c: 250, f: 70 }; localStorage.setItem('n-goals', JSON.stringify(goals)); toggleProfile(); updateStats(); }
  
  render(); renderWater();
</script>
</body>
</html>
